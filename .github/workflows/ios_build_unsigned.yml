name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:
  push:              
    branches:
      - main         

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_ios:
    name: Build iOS App
    runs-on: macos-latest 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 鎖定 Flutter 版本以符合 pubspec.yaml 中的 Dart 3.11.1 要求
      # 建議明確指定版本 (例如 3.19.x 或更新版本)，確保 CI 環境不崩潰
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # 如果穩定版突然出問題，您可以取消註解下方設定指定版本
          # flutter-version: '3.19.0' 
          cache: true       

      - name: Install Dependencies
        run: |
          flutter config --no-enable-swift-package-manager
          flutter pub get

      # 保留產生 Dummy Plist 的步驟，這是編譯 Unsigned IPA 必需的
      - name: Setup Mock Firebase Config
        run: |
          mkdir -p ios/Runner
          if [ ! -f ios/Runner/GoogleService-Info.plist ]; then
            echo "Creating dummy GoogleService-Info.plist to satisfy build"
            cat <<EOF > ios/Runner/GoogleService-Info.plist
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
              <key>API_KEY</key><string>dummy_api_key</string>
              <key>GCM_SENDER_ID</key><string>1234567890</string>
              <key>PLIST_VERSION</key><string>1</string>
              <key>PROJECT_ID</key><string>dummy-project-id</string>
              <key>STORAGE_BUCKET</key><string>dummy.appspot.com</string>
              <key>GOOGLE_APP_ID</key><string>1:1234567890:ios:abcdefg123456</string>
            </dict>
            </plist>
          EOF
          fi

      # 直接執行編譯 (移除所有 sed Hack，因為專案本身已經設定正確)
      - name: Build iOS (No Codesign)
        run: |
          flutter build ios --release --no-codesign

      - name: Create IPA Payload
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r -y app.ipa Payload
          rm -rf Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: app.ipa
