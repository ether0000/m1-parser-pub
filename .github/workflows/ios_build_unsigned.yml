name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch: # 保留手動按鈕
  push:              
    branches:
      - main         

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_ios:
    name: Build iOS App
    runs-on: macos-latest 

    steps:
      # 1. 取得程式碼
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 設定 Flutter 環境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true       

      # 3. 下載專案所需的套件
      - name: Install Dependencies
        run: flutter pub get

      # 4. 確保 Firebase iOS 設定存在
      - name: Setup Mock Firebase Config
        run: |
          mkdir -p ios/Runner
          if [ ! -f ios/Runner/GoogleService-Info.plist ]; then
            echo "Creating dummy GoogleService-Info.plist to satisfy build"
            echo '<?xml version="1.0" encoding="UTF-8"?>' > ios/Runner/GoogleService-Info.plist
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> ios/Runner/GoogleService-Info.plist
            echo '<plist version="1.0">' >> ios/Runner/GoogleService-Info.plist
            echo '<dict>' >> ios/Runner/GoogleService-Info.plist
            echo '  <key>API_KEY</key><string>dummy_api_key</string>' >> ios/Runner/GoogleService-Info.plist
            echo '  <key>GCM_SENDER_ID</key><string>1234567890</string>' >> ios/Runner/GoogleService-Info.plist
            echo '  <key>PLIST_VERSION</key><string>1</string>' >> ios/Runner/GoogleService-Info.plist
            echo '  <key>PROJECT_ID</key><string>dummy-project-id</string>' >> ios/Runner/GoogleService-Info.tsv
            echo '  <key>STORAGE_BUCKET</key><string>dummy.appspot.com</string>' >> ios/Runner/GoogleService-Info.plist
            echo '  <key>GOOGLE_APP_ID</key><string>1:1234567890:ios:abcdefg123456</string>' >> ios/Runner/GoogleService-Info.plist
            echo '</dict>' >> ios/Runner/GoogleService-Info.plist
            echo '</plist>' >> ios/Runner/GoogleService-Info.plist
          fi

      # 5. 強制校正 Xcode 專案檔的 Deployment Target 至 15.0，完美契合 Firebase
      - name: Force Xcode Target to iOS 15.0
        run: |
          echo "Setting IPHONEOS_DEPLOYMENT_TARGET to 15.0 in pbxproj..."
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' ios/Runner.xcodeproj/project.pbxproj
          
          echo "Regenerating iOS configuration..."
          flutter build ios --config-only

      # 6. 執行編譯 iOS
      - name: Build iOS (No Codesign)
        run: |
          flutter clean
          flutter pub get
          flutter build ios --release --no-codesign

      # 7. 安全打包成 .ipa 檔案
      - name: Create IPA Payload
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r -y app.ipa Payload
          rm -rf Payload

      # 8. 上傳不簽名的 IPA 產物
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: app.ipa
