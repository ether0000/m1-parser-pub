name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch: # 保留手動按鈕，以備不時之需
  push:              # 加入這一行，代表只要有 push 就觸發
    branches:
      - main         # 請確認你的預設分支是 main 還是 master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_ios:

    name: Build iOS App
    # 指定使用最新版的 macOS 虛擬機來執行
    runs-on: macos-latest 

    steps:
      # 1. 取得你的程式碼
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 設定 Flutter 環境 (自動下載並安裝 Flutter)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # 使用穩定版 Flutter
          cache: true       # 開啟快取加快後續編譯速度

      # 3. 下載專案所需的套件
      - name: Install Dependencies
        run: |
          flutter pub get
          flutter precache --ios

      # 4. 關鍵步驟：先清除快取，再編譯 iOS

      - name: Build iOS (No Codesign)
        run: |
          flutter clean
          flutter pub get
          flutter build ios --release --no-codesign

      # 5. 將編譯出的 Runner.app 打包成 .ipa 檔案
      - name: Create IPA payload
        run: |
          mkdir Payload
          # 將編譯好的 app 移入 Payload 資料夾
          mv build/ios/iphoneos/Runner.app Payload/
          # 壓縮成 zip 並更改副檔名為 .ipa
          zip -r app.ipa Payload

      # 6. 將打包好的 .ipa 檔案上傳為「產物 (Artifact)」，供我們下載
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: app.ipa
